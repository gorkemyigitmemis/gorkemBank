# ==========================================
# BANKA UYGULAMASI - YAPILANDIRMA DOSYASI
# ==========================================
# Bu dosya uygulamanın tüm ayarlarını içerir.
# Spring Boot başlatıldığında otomatik okunur.

# Uygulama adı
spring.application.name=banka

# ==========================================
# VERİTABANI AYARLARI (H2 - SQL Veritabanı)
# ==========================================

# H2 veritabanı dosya tabanlı çalışsın (veriler kalıcı olsun)
# ./data/banka → proje klasöründe "data" klasörü altında "banka.mv.db" dosyası oluşur
spring.datasource.url=jdbc:h2:file:./data/banka;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Veritabanı kullanıcısı ve şifresi (geliştirme ortamı için)
spring.datasource.username=sa
spring.datasource.password=

# H2 veritabanı sürücüsü
spring.datasource.driver-class-name=org.h2.Driver

# H2 Web Console'u aktif et (tarayıcıdan tabloları görmek için)
# http://localhost:8080/h2-console adresinden erişilebilir
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / HIBERNATE AYARLARI
# ==========================================

# Hibernate tabloları otomatik oluştursun/güncellesin
# update: Var olan tabloları koru, yeni sütunları ekle
spring.jpa.hibernate.ddl-auto=update

# SQL sorgularını konsola yazdır (debug için)
spring.jpa.show-sql=false

# JPA oturumunu view rendering sırasında açık tut
# (Lazy-loaded ilişkilerin Thymeleaf template'lerinde çalışması için)
spring.jpa.open-in-view=true

# H2 SQL lehçesini kullan
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# THYMELEAF AYARLARI (HTML şablon motoru)
# ==========================================

# Geliştirme sırasında cache kapalı olsun (değişiklikler hemen görünsün)
spring.thymeleaf.cache=false

# ==========================================
# SUNUCU AYARLARI
# ==========================================

# Uygulama 8080 portunda çalışsın
server.port=8080
