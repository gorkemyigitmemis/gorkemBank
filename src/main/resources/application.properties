# ==========================================
# BANKA UYGULAMASI - YAPILANDIRMA DOSYASI
# ==========================================
# Bu dosya uygulamanın tüm ayarlarını içerir.
# Spring Boot başlatıldığında otomatik okunur.

# Uygulama adı
spring.application.name=banka

# ==========================================
# VERİTABANI AYARLARI (MySQL)
# ==========================================

# MySQL veritabanı bağlantı adresi (gorkembank adında veritabanı açılmalıdır)
spring.datasource.url=jdbc:mysql://localhost:3306/gorkembank?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Web Console'u kapat
spring.h2.console.enabled=false

# ==========================================
# JPA / HIBERNATE AYARLARI
# ==========================================

# Hibernate tabloları otomatik oluştursun/güncellesin
spring.jpa.hibernate.ddl-auto=update

# SQL sorgularını konsola yazdır (debug için)
spring.jpa.show-sql=false

# JPA oturumunu view rendering sırasında açık tut
spring.jpa.open-in-view=true

# MySQL SQL lehçesini kullan
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# THYMELEAF AYARLARI (HTML şablon motoru)
# ==========================================

# Geliştirme sırasında cache kapalı olsun (değişiklikler hemen görünsün)
spring.thymeleaf.cache=false

# ==========================================
# SUNUCU AYARLARI
# ==========================================

# Uygulama 8080 portunda çalışsın
server.port=8080
