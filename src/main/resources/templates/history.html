<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Geçmişi - GörkemBank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body class="app-body">
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-icon-sm">🏦</span>
            <span class="nav-title">GörkemBank</span>
        </div>
        <div class="nav-links">
            <a th:href="@{/panel}" class="nav-link">Panel</a>
            <a th:href="@{/transfer}" class="nav-link">Transfer</a>
            <a th:href="@{/kredi}" class="nav-link">Kredi</a>
            <a th:href="@{/otomatik-odeme}" class="nav-link">Ödeme</a>
            <a th:href="@{/borsa}" class="nav-link">Borsa</a>
            <a th:href="@{/gecmis}" class="nav-link active">Geçmiş</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/analitik}" class="nav-link nav-link-admin">📊 Analitik</a>
        </div>
        <div class="nav-user" style="display:flex; align-items:center; gap:10px;">
            <button type="button" class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <span class="user-greeting">Merhaba, <strong th:text="${user.ad}">Kullanıcı</strong></span>
            <form th:action="@{/cikis}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline btn-sm">Çıkış</button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>📋 İşlem Geçmişi</h1>
            <p th:if="${currentAccount}">
                Hesap: <strong th:text="${currentAccount.formattedIban}">IBAN</strong>
            </p>
        </div>

        <!-- İşlem Tablosu -->
        <div class="table-card" th:if="${transactions != null and !transactions.isEmpty()}">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tarih</th>
                        <th>Tür</th>
                        <th>Karşı Taraf</th>
                        <th>Açıklama</th>
                        <th>Tutar</th>
                        <th>Durum</th>
                        <th>Referans No</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</td>
                        <td><span class="badge" th:text="${tx.transactionType}">HAVALE</span></td>
                        <td th:if="${currentAccount != null and tx.senderAccount.id == currentAccount.id}"
                            th:text="${tx.receiverAccount.user.fullName}">Alıcı</td>
                        <td th:if="${currentAccount != null and tx.senderAccount.id != currentAccount.id}"
                            th:text="${tx.senderAccount.user.fullName}">Gönderici</td>
                        <td th:text="${tx.description != null ? tx.description : '-'}">-</td>
                        <td th:if="${currentAccount != null}"
                            th:classappend="${tx.senderAccount.id == currentAccount.id} ? 'amount-out' : 'amount-in'">
                            <span th:text="${tx.senderAccount.id == currentAccount.id ? '-' : '+'}"></span>₺<span th:text="${#numbers.formatDecimal(tx.amount, 1, 'COMMA', 2, 'POINT')}">0,00</span>
                        </td>
                        <td><span class="badge badge-success" th:text="${tx.status}">BASARILI</span></td>
                        <td class="ref-no">
                            <span th:text="${tx.referenceNo}">uuid</span>
                            <a th:href="@{'/dekont/' + ${tx.referenceNo}}" target="_blank" class="btn btn-outline-light btn-sm" style="margin-left:8px; padding: 2px 8px; font-size: 0.75rem;">📄 İndir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${transactions == null or transactions.isEmpty()}" class="empty-state">
            <p>📭 Henüz işlem bulunmuyor.</p>
        </div>

        <!-- Sayfalama -->
        <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
            <a th:if="${currentPage > 0}"
               th:href="@{/gecmis(sayfa=${currentPage - 1})}" class="btn btn-outline btn-sm">← Önceki</a>
            <span class="page-info">Sayfa <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span></span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/gecmis(sayfa=${currentPage + 1})}" class="btn btn-outline btn-sm">Sonraki →</a>
        </div>
    </main>
</body>
</html>
