<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Transferi - GörkemBank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-icon-sm">🏦</span>
            <span class="nav-title">GörkemBank</span>
        </div>
        <div class="nav-links">
            <a th:href="@{/panel}" class="nav-link">Panel</a>
            <a th:href="@{/transfer}" class="nav-link active">Transfer</a>
            <a th:href="@{/gecmis}" class="nav-link">Geçmiş</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/analitik}" class="nav-link nav-link-admin">📊 Analitik</a>
        </div>
        <div class="nav-user">
            <form th:action="@{/cikis}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline btn-sm">Çıkış</button>
            </form>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>💸 Para Transferi</h1>
            <p>IBAN numarasıyla başka bir hesaba para gönderin.</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success">
            <span>✅</span>
            <span th:text="${successMessage}"></span>
        </div>

        <div th:if="${errorMessage}" class="alert alert-error">
            <span>⚠️</span>
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="form-card">
            <form th:action="@{/transfer}" method="post" class="transfer-form">
                <div class="form-group">
                    <label for="senderAccountId">Gönderici Hesap</label>
                    <select id="senderAccountId" name="senderAccountId" required>
                        <option value="">Hesap seçiniz...</option>
                        <option th:each="account : ${accounts}"
                                th:value="${account.id}"
                                th:text="${account.accountType + ' - ' + account.formattedIban + ' (₺' + #numbers.formatDecimal(account.balance, 1, 'COMMA', 2, 'POINT') + ')'}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="receiverIban">Alıcı IBAN</label>
                    <input type="text" id="receiverIban" name="receiverIban"
                           placeholder="TR00 0000 0000 0000 0000 0000 00" maxlength="32" required>
                </div>

                <div class="form-group">
                    <label for="amount">Tutar (₺)</label>
                    <input type="number" id="amount" name="amount"
                           placeholder="0.00" step="0.01" min="0.01" required>
                </div>

                <div class="form-group">
                    <label for="description">Açıklama (opsiyonel)</label>
                    <input type="text" id="description" name="description"
                           placeholder="Kira, fatura, hediye...">
                </div>

                <button type="submit" class="btn btn-primary btn-full" onclick="return confirm('Transfer işlemini onaylıyor musunuz?')">
                    Transferi Gönder
                </button>
            </form>
        </div>
    </main>
</body>
</html>
